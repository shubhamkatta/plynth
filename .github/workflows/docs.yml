# ------------------------------------------------------------------------------
# Plynth documentation site — deploys MkDocs Material to GitHub Pages.
#
# What this deploys:
#   The MkDocs Material site built from `mkdocs.yml` + `docs/**` (plus README).
#
# Where it ends up:
#   https://shubhamkatta.github.io/plynth/
#
# One-time setup the maintainer MUST do in GitHub (only once per repo):
#   Settings → Pages → Build and deployment → Source: "GitHub Actions"
#   (CLI equivalent: `gh api -X POST /repos/<owner>/<repo>/pages -F build_type=workflow`)
#
# Uses the modern Pages flow (configure-pages + upload-pages-artifact +
# deploy-pages) — no `gh-pages` branch involved.
# ------------------------------------------------------------------------------

name: Deploy docs to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'mkdocs.yml'
      - 'docs/**'
      - 'README.md'
      - '.github/workflows/docs.yml'
  workflow_dispatch:

# Workflow-level permissions required by actions/deploy-pages (OIDC).
permissions:
  contents: read
  pages: write
  id-token: write

# Only one Pages deploy at a time. Do NOT cancel an in-flight deploy:
# the Pages API gets unhappy when a deployment is aborted mid-flight.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    name: Build site
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Full history lets us add the git-revision-date plugin later
          # without changing this workflow.
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-docs-${{ hashFiles('.github/workflows/docs.yml') }}
          restore-keys: |
            ${{ runner.os }}-pip-docs-

      - name: Install MkDocs Material
        run: |
          python -m pip install --upgrade pip
          pip install mkdocs-material pymdown-extensions

      - name: Configure Pages
        uses: actions/configure-pages@v6

      - name: Build site (strict)
        run: mkdocs build --strict --site-dir _site

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
