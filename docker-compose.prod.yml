# Production overlay. Apply on top of docker-compose.yml on the server:
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
#
# Differences vs the dev compose:
# - All services `restart: unless-stopped` so they survive reboots.
# - API runs gunicorn (no --reload); no host port — Caddy reaches it on
#   the internal docker network at api:8000.
# - Source volume bind-mount removed; container uses baked-in code.
# - Postgres data volume bound to a host path for easy backups + portability.
# - Postgres + Redis ports closed to the outside — internal-only.
# - Caddy container terminates TLS and reverse-proxies to the api.
# - Caddy mounts the `./certs/` dir, not individual files. Single-file bind
#   mounts trigger Docker's silent "create empty directory if source is
#   missing" behaviour, which leaves Caddy reading a 0-byte dir as a cert
#   and exploding. Mounting the parent dir errors loudly instead.
#
# `!reset` is required because compose v2 APPENDS `ports` lists from base +
# overlay rather than replacing — without it the api would try to bind
# both 0.0.0.0:8000 (from base) AND 127.0.0.1:8000 (overlay) and conflict
# with itself. Requires compose plugin ≥ 2.24 (shipped Jan 2024).

services:
  db:
    restart: unless-stopped
    ports: !reset []                       # no host binding; internal only
    volumes:
      - /var/lib/platform/pgdata:/var/lib/postgresql/data

  redis:
    restart: unless-stopped
    ports: !reset []                       # no host binding; internal only

  api:
    restart: unless-stopped
    volumes: !reset []                     # use baked-in code, not host source
    command:
      - gunicorn
      - app.main:app
      - -k
      - uvicorn.workers.UvicornWorker
      - -w
      - "2"
      - -b
      - 0.0.0.0:8000
      - --access-logfile
      - "-"
      - --error-logfile
      - "-"
    ports: !reset []                       # no host binding; Caddy uses api:8000
    environment:
      APP_ENV: production
      APP_DEBUG: "false"
      APP_LOG_LEVEL: INFO

  worker:
    restart: unless-stopped
    volumes: !reset []
    environment:
      APP_ENV: production
      APP_DEBUG: "false"
      APP_LOG_LEVEL: INFO

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"                      # HTTP/3
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - ./certs:/etc/caddy/certs:ro          # mount the dir, not individual files
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - api

volumes:
  caddy_data:
  caddy_config:
