# Production overlay. Apply on top of docker-compose.yml on the server:
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
#
# Differences vs the dev compose:
# - All services `restart: unless-stopped` so they survive reboots.
# - API runs gunicorn (no --reload), bound to 127.0.0.1 only — Caddy fronts it.
# - Source volume bind-mount removed; container uses baked-in code.
# - Postgres data volume bound to a host path for easy backups + portability.
# - Caddy container terminates TLS and reverse-proxies to the api.

services:
  db:
    restart: unless-stopped
    ports: []                              # don't expose Postgres to the internet
    volumes:
      - /var/lib/platform/pgdata:/var/lib/postgresql/data

  redis:
    restart: unless-stopped
    ports: []                              # don't expose Redis to the internet

  api:
    restart: unless-stopped
    volumes: []                            # use baked-in code, not host source
    command:
      - gunicorn
      - app.main:app
      - -k
      - uvicorn.workers.UvicornWorker
      - -w
      - "2"
      - -b
      - 0.0.0.0:8000
      - --access-logfile
      - "-"
      - --error-logfile
      - "-"
    ports:
      - "127.0.0.1:8000:8000"              # localhost only; Caddy proxies
    environment:
      APP_ENV: production
      APP_DEBUG: "false"
      APP_LOG_LEVEL: INFO

  worker:
    restart: unless-stopped
    volumes: []
    environment:
      APP_ENV: production
      APP_DEBUG: "false"
      APP_LOG_LEVEL: INFO

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"                      # HTTP/3
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data                   # ACME cert storage — DO NOT lose this
      - caddy_config:/config
    depends_on:
      - api

volumes:
  caddy_data:
  caddy_config:
