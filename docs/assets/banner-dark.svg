<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 320">
  <!-- Product boxes -->
  <rect x="100" y="20" width="120" height="40" rx="6" fill="none" stroke="#f0f6fc" stroke-width="1.5"/>
  <rect x="260" y="20" width="120" height="40" rx="6" fill="none" stroke="#f0f6fc" stroke-width="1.5"/>
  <rect x="420" y="20" width="120" height="40" rx="6" fill="none" stroke="#f0f6fc" stroke-width="1.5"/>
  <rect x="580" y="20" width="120" height="40" rx="6" fill="none" stroke="#f0f6fc" stroke-width="1.5"/>

  <!-- Box labels -->
  <text x="160" y="46" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="14" fill="#f0f6fc">App</text>
  <text x="320" y="46" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="14" fill="#f0f6fc">App</text>
  <text x="480" y="46" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="14" fill="#f0f6fc">App</text>
  <text x="640" y="46" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="14" fill="#f0f6fc">App</text>

  <!-- Connectors from each App box to the capital -->
  <line x1="160" y1="60" x2="160" y2="110" stroke="#f0f6fc" stroke-width="1.5"/>
  <line x1="320" y1="60" x2="320" y2="110" stroke="#f0f6fc" stroke-width="1.5"/>
  <line x1="480" y1="60" x2="480" y2="110" stroke="#f0f6fc" stroke-width="1.5"/>
  <line x1="640" y1="60" x2="640" y2="110" stroke="#f0f6fc" stroke-width="1.5"/>

  <!-- Capital (entablature) -->
  <rect x="90" y="110" width="620" height="10" fill="#f0f6fc"/>

  <!-- 8 Pillars, evenly spaced across the capital -->
  <rect x="124" y="125" width="9" height="90" fill="#f0f6fc"/>
  <rect x="202" y="125" width="9" height="90" fill="#f0f6fc"/>
  <rect x="279" y="125" width="9" height="90" fill="#f0f6fc"/>
  <rect x="357" y="125" width="9" height="90" fill="#f0f6fc"/>
  <rect x="434" y="125" width="9" height="90" fill="#f0f6fc"/>
  <rect x="512" y="125" width="9" height="90" fill="#f0f6fc"/>
  <rect x="589" y="125" width="9" height="90" fill="#f0f6fc"/>
  <rect x="667" y="125" width="9" height="90" fill="#f0f6fc"/>

  <!-- Base (plinth) -->
  <rect x="75" y="220" width="650" height="16" fill="#f0f6fc"/>

  <!-- PLYNTH name -->
  <text x="400" y="275" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="36" font-weight="bold" letter-spacing="10" fill="#f0f6fc">PLYNTH</text>

  <!-- Inscription -->
  <text x="400" y="298" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="13" letter-spacing="2" fill="#f0f6fc" opacity="0.65">identity · tenancy · rbac · billing · audit</text>

  <!-- Ground line -->
  <rect x="40" y="312" width="720" height="4" fill="#f0f6fc"/>
</svg>
